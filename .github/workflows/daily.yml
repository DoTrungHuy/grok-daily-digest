name: Daily X Digest

# 北京 08:00 = UTC 00:00
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          pip install pyyaml
          pip install twitter-cli || true
          python -c "import shutil; print('twitter=', shutil.which('twitter'))"

      - name: Run daily pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          ALL_PROXY: ${{ secrets.ALL_PROXY }}
        run: |
          test -n "$DEEPSEEK_API_KEY" || { echo "Need DEEPSEEK_API_KEY"; exit 1; }
          test -n "$TWITTER_AUTH_TOKEN" || { echo "Need TWITTER_AUTH_TOKEN"; exit 1; }
          test -n "$TWITTER_CT0" || { echo "Need TWITTER_CT0"; exit 1; }
          python scripts/run_daily.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digests/ x_raw/ docs/index.html docs/style.css docs/[0-9]*.html || true
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore(digest): $(date -u +%Y-%m-%d)"
            git push
          fi
